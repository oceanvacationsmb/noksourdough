<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NokSourdough Invoice System</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="layout">

<div class="sidebar">

<div class="logo">
NokSourdough
</div>

<div class="menu">

<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('customers')">Customers</button>
<button onclick="showPage('products')">Products</button>
<button onclick="showPage('invoices')">Invoices</button>
<button onclick="showPage('settings')">Settings</button>

</div>

</div>

<div class="content">

<div id="dashboard" class="page active">

<h1>Dashboard</h1>

<div class="cards">

<div class="card">
<div class="card-title">Customers</div>
<div id="customersCount" class="card-value">0</div>
</div>

<div class="card">
<div class="card-title">Products</div>
<div id="productsCount" class="card-value">0</div>
</div>

<div class="card">
<div class="card-title">Invoices</div>
<div id="invoicesCount" class="card-value">0</div>
</div>

<div class="card">
<div class="card-title">Past Due</div>
<div id="pastDueCount" class="card-value">0</div>
</div>

</div>

</div>

<div id="customers" class="page">

<h1>Customers</h1>

<div class="section">

<input id="customerName" placeholder="Customer Name">

<input id="customerPhone" placeholder="Phone">

<input id="customerEmail" placeholder="Email">

<textarea id="customerAddress" placeholder="Address"></textarea>

<select id="customerTerms">
<option>COD</option>
<option>Net 15</option>
<option selected>Net 30</option>
<option>Net 45</option>
<option>Net 60</option>
</select>

<button id="saveCustomerBtn" class="primary">
Save Customer
</button>

</div>

<div class="section">

<h2>Customer List</h2>

<table>
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Email</th>
<th>Terms</th>
</tr>
</thead>

<tbody id="customerTableBody"></tbody>

</table>

</div>

</div>

<div id="products" class="page">

<h1>Products</h1>

<div class="section">

<input id="productName" placeholder="Product Name">

<input id="productPrice" type="number" placeholder="Price">

<button id="saveProductBtn" class="primary">
Save Product
</button>

</div>

<div class="section">

<h2>Product List</h2>

<table>
<thead>
<tr>
<th>Name</th>
<th>Price</th>
</tr>
</thead>

<tbody id="productTableBody"></tbody>

</table>

</div>

</div>

<div id="invoices" class="page">

<h1>Create Invoice</h1>

<div class="section">

<input id="invoiceNumber" readonly>

<div class="grid-2">

<select id="invoiceCustomer"></select>

<select id="invoiceTerms">
<option>COD</option>
<option>Net 15</option>
<option selected>Net 30</option>
<option>Net 45</option>
<option>Net 60</option>
</select>

</div>

<div class="grid-2">

<input id="invoiceDate" type="date">

<input id="invoiceDueDate" type="date">

</div>

<select id="invoiceProduct"></select>

<input
id="invoiceQty"
type="number"
value="1"
placeholder="Quantity">

<button
id="addItemBtn"
class="primary">
Add Item
</button>

<table>

<thead>
<tr>
<th>Item</th>
<th>Qty</th>
<th>Price</th>
<th>Total</th>
</tr>
</thead>

<tbody id="invoiceItemsBody"></tbody>

</table>

<div class="invoice-total">
$
<span id="invoiceTotal">0.00</span>
</div>

<textarea
id="invoiceNotes"
placeholder="Notes"></textarea>

<button
id="saveInvoiceBtn"
class="success">
Create Invoice
</button>

</div>

</div>

<div id="settings" class="page">

<h1>Company Settings</h1>

<div class="section">

<input id="companyName" placeholder="Company Name">

<input id="companyPhone" placeholder="Phone">

<input id="companyEmail" placeholder="Email">

<input id="companyWebsite" placeholder="Website">

<input id="taxId" placeholder="Tax ID">

<input id="companyLogo" placeholder="Logo URL">

<textarea id="companyAddress"
placeholder="Address"></textarea>

<button id="saveCompanyBtn"
class="success">
Save Company
</button>

</div>

</div>

</div>

</div>

<script>
function showPage(page){

document.querySelectorAll('.page').forEach(p=>{
p.classList.remove('active');
});

document.getElementById(page)
.classList.add('active');

}
</script>

<script src="app.js"></script>

</body>
</html>
