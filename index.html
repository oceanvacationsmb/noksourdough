<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NokSourdough Invoice System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
}

.layout{
display:flex;
height:100vh;
}

.sidebar{
width:240px;
background:#111827;
color:white;
padding:20px;
}

.logo{
font-size:24px;
font-weight:bold;
margin-bottom:30px;
}

.menu button{
width:100%;
padding:14px;
margin-bottom:10px;
border:none;
border-radius:8px;
background:#1f2937;
color:white;
cursor:pointer;
text-align:left;
}

.menu button:hover{
background:#2563eb;
}

.content{
flex:1;
padding:25px;
overflow:auto;
}

.page{
display:none;
}

.page.active{
display:block;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.card h3{
font-size:15px;
color:#666;
}

.card-value{
font-size:34px;
font-weight:bold;
margin-top:10px;
color:#2563eb;
}

.section{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
margin-top:20px;
}

.toolbar{
margin-bottom:20px;
}

.toolbar button{
padding:12px 18px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #ddd;
padding:12px;
text-align:left;
}

th{
background:#f3f4f6;
}

input,
select,
textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
}

.save-btn{
background:#2563eb;
color:white;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="layout">

<div class="sidebar">

<div class="logo">
NokSourdough
</div>

<div class="menu">

<button onclick="showPage('dashboard')">
Dashboard
</button>

<button onclick="showPage('customers')">
Customers
</button>

<button onclick="showPage('products')">
Products
</button>

<button onclick="showPage('invoices')">
Invoices
</button>

<button onclick="showPage('settings')">
Settings
</button>

</div>

</div>

<div class="content">

<div id="dashboard" class="page active">

<h1>Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Customers</h3>
<div id="customersCount" class="card-value">0</div>
</div>

<div class="card">
<h3>Products</h3>
<div id="productsCount" class="card-value">0</div>
</div>

<div class="card">
<h3>Invoices</h3>
<div id="invoicesCount" class="card-value">0</div>
</div>

<div class="card">
<h3>Past Due</h3>
<div id="pastDueCount" class="card-value">0</div>
</div>

</div>

</div>

<div id="customers" class="page">

<h1>Customers</h1>

<div class="section">

<h3>Add Customer</h3>

<input id="customerName" placeholder="Customer Name">

<input id="customerPhone" placeholder="Phone">

<input id="customerEmail" placeholder="Email">

<textarea id="customerAddress" placeholder="Address"></textarea>

<select id="customerTerms">
<option>COD</option>
<option>Net 15</option>
<option selected>Net 30</option>
<option>Net 45</option>
<option>Net 60</option>
</select>

<button id="saveCustomerBtn" class="save-btn">
Save Customer
</button>

</div>

</div>

<div id="products" class="page">

<h1>Products</h1>

<div class="section">

<h3>Add Product</h3>

<input id="productName" placeholder="Product Name">

<input id="productPrice" type="number" placeholder="Price">

<button id="saveProductBtn" class="save-btn">
Save Product
</button>

</div>

</div>

<div id="invoices" class="page">

<h1>Invoices</h1>

<div class="section">

<h3>Create Invoice</h3>

<input id="invoiceNumber" placeholder="Invoice Number">

<input id="invoiceDate" type="date">

<input id="invoiceDueDate" type="date">

<select id="invoiceCustomer">
<option>Select Customer</option>
</select>

<select id="invoiceTerms">
<option>COD</option>
<option>Net 15</option>
<option selected>Net 30</option>
<option>Net 45</option>
<option>Net 60</option>
</select>

<textarea id="invoiceNotes" placeholder="Notes"></textarea>

<button class="save-btn">
Create Invoice
</button>

</div>

</div>

<div id="settings" class="page">

<h1>Settings</h1>

<div class="section">

<input
id="companyName"
placeholder="Company Name">

<input
id="companyPhone"
placeholder="Company Phone">

<input
id="companyEmail"
placeholder="Company Email">

<input
id="companyWebsite"
placeholder="Website">

<input
id="taxId"
placeholder="Tax ID">

<textarea
id="companyAddress"
placeholder="Company Address"></textarea>

<button
id="saveCompanyBtn"
class="save-btn">
Save Company
</button>

</div>

</div>

</div>

</div>

</div>

<script>
function showPage(page){

document.querySelectorAll('.page').forEach(p=>{
p.classList.remove('active');
});

document.getElementById(page).classList.add('active');

}
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

</body>
</html>
